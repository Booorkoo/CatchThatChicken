<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff6b35">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Catch That Chicken! 🐔</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23ff6b35'/><text y='78' x='50' text-anchor='middle' font-size='68'>🐔</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23ff6b35'/><text y='78' x='50' text-anchor='middle' font-size='68'>🐔</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --bg: #fff9e6;
    --yellow: #ffd93d;
    --orange: #ff6b35;
    --red: #ff2d55;
    --green: #6bcb77;
    --blue: #4d96ff;
    --dark: #2d2d2d;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    background-image: 
      radial-gradient(circle at 20% 80%, var(--sky1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, var(--sky2) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, var(--sky3) 0%, transparent 70%);
    transition: background 0.5s;
  }

  /* THEMES */
  body.theme-farm {
    --bg: #fff9e6;
    --ground: #6bcb77;
    --ground-dark: #4aab5c;
    --sky1: rgba(255,217,61,0.3);
    --sky2: rgba(255,107,53,0.2);
    --sky3: rgba(107,203,119,0.1);
  }
  body.theme-space {
    --bg: #0d0d2b;
    --ground: #1a1a4e;
    --ground-dark: #0d0d35;
    --sky1: rgba(100,60,255,0.3);
    --sky2: rgba(255,60,180,0.15);
    --sky3: rgba(60,200,255,0.1);
    --dark: #ffffff;
    --yellow: #7b5ea7;
    --orange: #a855f7;
    --white: #1a1a3e;
  }
  body.theme-beach {
    --bg: #fff5d6;
    --ground: #f0c040;
    --ground-dark: #d4a020;
    --sky1: rgba(77,150,255,0.3);
    --sky2: rgba(255,200,50,0.2);
    --sky3: rgba(100,220,255,0.2);
  }

  /* THEME PICKER */
  #theme-picker {
    display: flex;
    gap: 12px;
    margin: 4px 0;
  }
  .theme-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 16px;
    padding: 10px 14px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    color: var(--dark);
  }
  .theme-btn .theme-icon { font-size: 2rem; }
  .theme-btn.active {
    background: var(--yellow);
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--dark);
  }
  .theme-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--dark); }

  /* ARENA BACKGROUNDS */
  #arena.theme-farm { background: transparent; }

  #arena.theme-space {
    background: #0d0d2b;
  }
  #arena.theme-beach {
    background: linear-gradient(180deg, #87ceeb 0%, #87ceeb 60%, #f0c040 60%);
  }

  /* Space decorations */
  .space-star {
    position: absolute;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    animation: twinkle 2s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.3; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.3); }
  }

  /* Beach decorations */
  .beach-wave {
    position: absolute;
    bottom: 50px;
    left: 0; right: 0;
    height: 20px;
    background: rgba(100,180,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    animation: wave 2s ease-in-out infinite alternate;
  }
  @keyframes wave {
    from { transform: scaleX(1) translateX(0); }
    to   { transform: scaleX(1.05) translateX(-10px); }
  }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* START SCREEN */
  #start-screen {
    gap: 20px;
    padding: 30px;
  }

  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 15vw, 5rem);
    color: var(--orange);
    text-shadow: 4px 4px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.1);
    line-height: 1;
    text-align: center;
    animation: titleBounce 1s ease-in-out infinite alternate;
  }

  @keyframes titleBounce {
    from { transform: rotate(-2deg) scale(1); }
    to { transform: rotate(2deg) scale(1.05); }
  }

  .chicken-preview {
    font-size: 6rem;
    animation: previewDance 0.5s ease-in-out infinite alternate;
    cursor: pointer;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
  }

  @keyframes previewDance {
    from { transform: rotate(-10deg) translateY(0); }
    to { transform: rotate(10deg) translateY(-10px); }
  }

  .subtitle {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--dark);
    text-align: center;
    background: var(--yellow);
    padding: 10px 20px;
    border-radius: 50px;
    border: 3px solid var(--dark);
    box-shadow: 3px 3px 0 var(--dark);
  }

  .start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--white);
    background: var(--green);
    border: 4px solid var(--dark);
    border-radius: 20px;
    padding: 15px 50px;
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: btnPulse 1.5s ease-in-out infinite;
  }

  @keyframes btnPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .start-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--dark);
  }

  .high-score-display {
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    opacity: 0.6;
  }

  /* Force fullscreen feel — hide URL bar on mobile scroll trick */
  html {
    height: 100%;
    overflow: hidden;
  }

  body {
    height: 100%;
    min-height: 100dvh;
  }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    z-index: 10;
    pointer-events: none;
  }

  .hud-score {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--dark);
    background: var(--yellow);
    padding: 4px 14px;
    border-radius: 50px;
    border: 2px solid var(--dark);
    box-shadow: 2px 2px 0 var(--dark);
  }

  .hud-lives {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--dark);
    background: var(--white);
    padding: 4px 10px;
    border-radius: 50px;
    border: 2px solid var(--dark);
    box-shadow: 2px 2px 0 var(--dark);
    letter-spacing: 1px;
    transition: background 0.2s;
  }

  .hud-lives.danger { background: #ffe0e0; animation: livesShake 0.3s; }
  @keyframes livesShake {
    0%, 100% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-5deg) scale(1.1); }
    75% { transform: rotate(5deg) scale(1.1); }
  }

  .life-lost {
    position: absolute;
    font-size: 2rem;
    pointer-events: none;
    z-index: 20;
    animation: lifeLostAnim 0.8s ease-out forwards;
  }
  @keyframes lifeLostAnim {
    0% { opacity: 1; transform: scale(1.5) translateY(0); }
    100% { opacity: 0; transform: scale(0.5) translateY(-60px); }
  }

  #arena {
    position: absolute;
    inset: 0;
    top: 80px;
  }

  /* CHICKEN */
  #chicken {
    position: absolute;
    font-size: clamp(3rem, 12vw, 5rem);
    cursor: pointer;
    transition: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    z-index: 5;
    will-change: transform, left, top;
    line-height: 1;
  }

  #chicken.caught {
    animation: caughtJolt 0.35s ease-out forwards;
  }

  @keyframes caughtJolt {
    0%   { transform: scale(1) rotate(0); filter: brightness(1) drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
    30%  { transform: scale(1.7) rotate(-15deg); filter: brightness(2.5) drop-shadow(0 0 20px gold); }
    60%  { transform: scale(0.85) rotate(10deg); filter: brightness(1.5); }
    100% { transform: scale(1) rotate(0); filter: brightness(1) drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
  }

  #chicken.running-left { transform: scaleX(-1); }
  #chicken.running-right { transform: scaleX(1); }

  /* SPEECH BUBBLE */
  #speech {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 5vw, 1.4rem);
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 15px;
    padding: 8px 14px;
    box-shadow: 3px 3px 0 var(--dark);
    pointer-events: none;
    z-index: 6;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s;
    color: var(--dark);
  }

  #speech.visible { opacity: 1; }
  #speech::after {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 15px;
    border: 7px solid transparent;
    border-top-color: var(--dark);
  }
  #speech::before {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 16px;
    border: 6px solid transparent;
    border-top-color: var(--white);
    z-index: 1;
  }

  /* SCORE POPUP */
  .score-pop {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--orange);
    text-shadow: 2px 2px 0 var(--dark);
    pointer-events: none;
    z-index: 20;
    animation: scoreFloat 0.8s ease-out forwards;
  }

  @keyframes scoreFloat {
    0% { transform: scale(1.5) translateY(0); opacity: 1; }
    100% { transform: scale(0.8) translateY(-60px); opacity: 0; }
  }

  /* MISS EFFECT */
  .miss-text {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: var(--red);
    pointer-events: none;
    z-index: 20;
    animation: missFloat 0.7s ease-out forwards;
  }

  @keyframes missFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
  }

  /* FEATHERS */
  .feather {
    position: absolute;
    font-size: 1.2rem;
    pointer-events: none;
    z-index: 15;
    animation: featherFall 0.8s ease-out forwards;
  }

  @keyframes featherFall {
    0% { transform: translate(0,0) rotate(0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0); opacity: 0; }
  }

  /* GAME OVER SCREEN */
  #gameover-screen {
    gap: 20px;
    padding: 30px;
  }

  .gameover-emoji {
    font-size: 5rem;
    animation: gounceBounce 0.6s ease-in-out infinite alternate;
  }

  @keyframes gounceBounce {
    from { transform: scale(1) rotate(-5deg); }
    to { transform: scale(1.1) rotate(5deg); }
  }

  .gameover-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 10vw, 3rem);
    color: var(--red);
    text-shadow: 3px 3px 0 var(--dark);
    text-align: center;
  }

  .final-score-box {
    background: var(--yellow);
    border: 4px solid var(--dark);
    border-radius: 20px;
    padding: 20px 40px;
    text-align: center;
    box-shadow: 5px 5px 0 var(--dark);
  }

  .final-score-label {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--dark);
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .final-score-num {
    font-family: 'Fredoka One', cursive;
    font-size: 4rem;
    color: var(--orange);
    line-height: 1;
  }

  .new-record {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--green);
    background: var(--white);
    border: 3px solid var(--dark);
    padding: 5px 15px;
    border-radius: 50px;
    box-shadow: 2px 2px 0 var(--dark);
    animation: recordPop 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
  }

  @keyframes recordPop {
    from { transform: scale(0) rotate(-10deg); }
    to { transform: scale(1) rotate(0); }
  }

  .play-again-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--white);
    background: var(--orange);
    border: 4px solid var(--dark);
    border-radius: 20px;
    padding: 12px 40px;
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .play-again-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--dark);
  }

  /* COUNTDOWN */
  #countdown-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    background: rgba(255,249,230,0.85);
    backdrop-filter: blur(4px);
  }

  .countdown-num {
    font-family: 'Fredoka One', cursive;
    font-size: 20vw;
    color: var(--orange);
    text-shadow: 6px 6px 0 var(--dark);
    animation: countPop 1s cubic-bezier(0.68,-0.55,0.265,1.55) forwards;
  }

  @keyframes countPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
    80% { transform: scale(0.9) rotate(-2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 0; }
  }

  /* LEADERBOARD */
  .leaderboard-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--dark);
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 50px;
    padding: 6px 18px;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .leaderboard-btn:active { transform: translate(2px,2px); box-shadow: none; }

  #leaderboard-screen {
    gap: 14px;
    padding: 24px 20px;
    overflow-y: auto;
  }

  .lb-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 2.8rem);
    color: var(--orange);
    text-shadow: 3px 3px 0 var(--dark);
  }

  .lb-table {
    width: 100%;
    max-width: 340px;
    border-collapse: collapse;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 8px;
    box-shadow: 3px 3px 0 var(--dark);
    animation: lbRowIn 0.3s cubic-bezier(0.68,-0.55,0.265,1.55) both;
  }
  .lb-row:nth-child(1) { background: #fff3cd; animation-delay: 0.05s; }
  .lb-row:nth-child(2) { background: #f0f0f0; animation-delay: 0.1s; }
  .lb-row:nth-child(3) { background: #ffe8d6; animation-delay: 0.15s; }

  @keyframes lbRowIn {
    from { transform: translateX(-30px) scale(0.9); opacity: 0; }
    to   { transform: translateX(0) scale(1); opacity: 1; }
  }

  .lb-rank {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    width: 36px;
    text-align: center;
  }
  .lb-name {
    flex: 1;
    font-weight: 700;
    font-size: 1rem;
    color: var(--dark);
  }
  .lb-score {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--orange);
  }
  .lb-empty {
    font-size: 1rem;
    color: var(--dark);
    opacity: 0.5;
    font-weight: 700;
  }

  /* Name input overlay */
  #name-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,249,230,0.92);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  #name-overlay.hidden { display: none; }
  .name-prompt {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--dark);
    text-align: center;
  }
  #name-input {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 10px 20px;
    border: 4px solid var(--dark);
    border-radius: 16px;
    width: 220px;
    text-align: center;
    background: var(--white);
    box-shadow: 3px 3px 0 var(--dark);
    outline: none;
  }
  .name-submit-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--white);
    background: var(--green);
    border: 4px solid var(--dark);
    border-radius: 16px;
    padding: 10px 32px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--dark);
  }
  .name-submit-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--dark); }
  #grass {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: var(--ground);
    border-top: 4px solid var(--dark);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    overflow: hidden;
    z-index: 1;
  }

  .grass-blade {
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 20px solid var(--ground-dark);
    margin-top: -16px;
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen">
  <div class="game-title">Catch That Chicken!</div>
  <div class="chicken-preview" id="preview-chicken">🐔</div>
  <div id="theme-picker">
    <button class="theme-btn active" data-theme="farm">
      <span class="theme-icon">🐄</span>Farm
    </button>
    <button class="theme-btn" data-theme="space">
      <span class="theme-icon">🚀</span>Space
    </button>
    <button class="theme-btn" data-theme="beach">
      <span class="theme-icon">🏖️</span>Beach
    </button>
  </div>
  <div class="subtitle">Tap the chicken before it escapes! 🥚</div>
  <button class="start-btn" id="start-btn">PLAY! 🐔</button>
  <div class="high-score-display" id="start-hi">Best: 0 chickens</div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen hidden">
  <div id="hud">
    <div class="hud-score" id="score-display">🐔 0</div>
    <div class="hud-lives" id="lives-display">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
  </div>
  <div id="arena">
    <div id="speech"></div>
    <div id="chicken">🐔</div>
    <div id="grass">
      <!-- blades generated by JS -->
    </div>
  </div>
  <div id="countdown-overlay">
    <div class="countdown-num" id="countdown-num">3</div>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen hidden">
  <div class="gameover-emoji" id="go-emoji">😵</div>
  <div class="gameover-title">She got away!</div>
  <div class="final-score-box">
    <div class="final-score-label">You caught</div>
    <div class="final-score-num" id="final-score">0</div>
    <div class="final-score-label">chickens</div>
  </div>
  <div id="new-record" class="new-record hidden">🏆 NEW RECORD!</div>
  <div class="high-score-display" id="go-hi">Best: 0</div>
  <button class="play-again-btn" id="play-again-btn">PLAY AGAIN! 🐔</button>
  <button class="leaderboard-btn" id="go-lb-btn">🏆 Leaderboard</button>
</div>

<!-- LEADERBOARD SCREEN -->
<div id="leaderboard-screen" class="screen hidden">
  <div class="lb-title">🏆 Leaderboard</div>
  <div id="lb-list" style="width:100%;max-width:340px;"></div>
  <button class="leaderboard-btn" id="lb-back-btn">← Back</button>
</div>

<!-- START SCREEN leaderboard button is added below in JS -->

<!-- NAME INPUT OVERLAY -->
<div id="name-overlay" class="hidden">
  <div class="name-prompt">New record! 🎉<br>Enter your name:</div>
  <input id="name-input" type="text" maxlength="12" placeholder="Your name..." autocomplete="off"/>
  <button class="name-submit-btn" id="name-submit-btn">Save 🐔</button>
</div>

<script>
const SOUNDS = {
  cluck: ['bwak!', 'bwak bwak!', 'BWAK BWAK BWAK!', 'cluck!', 'B-CAWK!', 'bwaaak!', 'bwak?!', 'CAAAWK!', 'bwak bwak bwak!', 'cooock-a-doodle...bwak!'],
  caught: ['OUCH!', 'Got me!', 'CAAAAWK! 😱', 'Noooo!', 'Let go!', 'SQUAAAWK!'],
  miss: ['Ha! Missed!', 'Too slow!', "Can't catch me!", 'Faster, human!']
};

// ── AUDIO ENGINE ──────────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ---- COUNTDOWN SOUND ----
// 3, 2, 1 = deep tense beep, each higher + reverb hit
// GO! = triumphant fanfare burst
function playCountdownBeep(number) {
  const ctx = getCtx(), t = ctx.currentTime;

  // Rising pitch: 3=220Hz, 2=330Hz, 1=440Hz
  const freqs = { 3: 220, 2: 330, 1: 440 };
  const freq = freqs[number] || 440;

  // Main beep — square wave for punchy feel
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const dist = ctx.createWaveShaper();

  // Soft distortion curve for warmth
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  dist.curve = curve;

  osc.type = 'square';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.setValueAtTime(freq * 1.005, t + 0.01); // tiny detune shimmer

  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
  gain.gain.setValueAtTime(0.4, t + 0.08);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

  osc.connect(dist);
  dist.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.55);

  // Low thud underneath
  const thud = ctx.createOscillator();
  const thudGain = ctx.createGain();
  thud.type = 'sine';
  thud.frequency.setValueAtTime(60, t);
  thud.frequency.exponentialRampToValueAtTime(30, t + 0.2);
  thudGain.gain.setValueAtTime(0.5, t);
  thudGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  thud.connect(thudGain); thudGain.connect(ctx.destination);
  thud.start(t); thud.stop(t + 0.3);

  // Tension riser noise that builds each count
  const bufSize = ctx.sampleRate * 0.4;
  const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = freq * 3;
  noiseFilter.Q.value = 8;
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0, t);
  noiseGain.gain.linearRampToValueAtTime(0.08 * (4 - number), t + 0.05);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);
  noise.start(t);
}

function playGoSound() {
  const ctx = getCtx(), t = ctx.currentTime;

  // Fanfare: quick ascending arpeggio
  const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t + i * 0.07);
    g.gain.linearRampToValueAtTime(0.35, t + i * 0.07 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.25);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t + i * 0.07); osc.stop(t + i * 0.07 + 0.3);
  });

  // Big low boom
  const boom = ctx.createOscillator();
  const boomGain = ctx.createGain();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(100, t);
  boom.frequency.exponentialRampToValueAtTime(40, t + 0.3);
  boomGain.gain.setValueAtTime(0.6, t);
  boomGain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  boom.connect(boomGain); boomGain.connect(ctx.destination);
  boom.start(t); boom.stop(t + 0.4);
}

// ---- BACKGROUND MUSIC LOOP ----
let bgInterval = null;
let bgPlaying = false;

function playBgNote(freq, startTime, duration, vol = 0.08) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol, startTime + 0.02);
  g.gain.setValueAtTime(vol, startTime + duration - 0.05);
  g.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(startTime); osc.stop(startTime + duration + 0.01);
}

// Playful looping melody — 4-bar farm tune
function scheduleBgLoop() {
  if (!bgPlaying) return;
  const ctx = getCtx();
  const t = ctx.currentTime + 0.05;
  const beat = 0.22; // tempo

  // Melody (main)
  const melody = [
    [523,1],[587,1],[659,1],[698,1],
    [784,2],[784,0],[659,1],[587,1],
    [523,1],[659,1],[587,1],[523,2],
    [494,1],[523,1],[587,1],[523,3],
  ];
  let offset = 0;
  melody.forEach(([freq, dur]) => {
    if (freq > 0) playBgNote(freq, t + offset * beat, dur * beat * 0.85, 0.07);
    offset += dur;
  });

  // Bass line
  const bass = [
    [130,4],[146,4],[164,4],[130,4],
  ];
  let bOffset = 0;
  bass.forEach(([freq, dur]) => {
    playBgNote(freq, t + bOffset * beat, dur * beat * 0.7, 0.06);
    bOffset += dur;
  });

  // Total loop duration
  const totalBeats = melody.reduce((s, [, d]) => s + d, 0);
  setTimeout(scheduleBgLoop, totalBeats * beat * 1000);
}

function musicPlay() {
  if (bgPlaying) return;
  bgPlaying = true;
  scheduleBgLoop();
}

function musicPause() {
  bgPlaying = false;
}

// ---- SFX ----
const KUKURIKU = [
  'kvo kvo', 'kvo kvo kvo', 'kvoooo',
  'KVO KVO KVO', 'kvo kvo kvooo', 'kvo',
];

function playKukuriku() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(
    KUKURIKU[Math.floor(Math.random() * KUKURIKU.length)]
  );
  const voices = window.speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang.startsWith('en') || v.lang.startsWith('sr')) || voices[0];
  if (voice) u.voice = voice;
  u.pitch = 2;
  u.rate = 1.4 + Math.random() * 0.4;
  u.volume = 1;
  window.speechSynthesis.speak(u);
}

function playCluck() {
  const ctx = getCtx(), t = ctx.currentTime;
  const count = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++) {
    const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(500 + Math.random()*120, t + i*0.13);
    o.frequency.exponentialRampToValueAtTime(160, t + i*0.13 + 0.11);
    f.type = 'bandpass'; f.frequency.value = 950; f.Q.value = 2.5;
    g.gain.setValueAtTime(0.3, t + i*0.13);
    g.gain.exponentialRampToValueAtTime(0.001, t + i*0.13 + 0.13);
    o.connect(f); f.connect(g); g.connect(ctx.destination);
    o.start(t + i*0.13); o.stop(t + i*0.13 + 0.14);
  }
}

function playCaught() {
  const ctx = getCtx(), t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(950, t);
  o.frequency.exponentialRampToValueAtTime(180, t + 0.22);
  g.gain.setValueAtTime(0.45, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + 0.26);
}

function playMiss() {
  const ctx = getCtx(), t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(320, t);
  o.frequency.exponentialRampToValueAtTime(80, t + 0.22);
  g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + 0.26);
}

function playGameOver() {
  musicPause();
  const ctx = getCtx(), t = ctx.currentTime;
  [380, 330, 280, 190].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.28, t + i*0.18);
    g.gain.exponentialRampToValueAtTime(0.001, t + i*0.18 + 0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(t + i*0.18); o.stop(t + i*0.18 + 0.22);
  });
}
// ──────────────────────────────────────────────────────────────

const chickenEl = document.getElementById('chicken');
const speechEl = document.getElementById('speech');
const scoreEl = document.getElementById('score-display');
const arenaEl = document.getElementById('arena');

let score = 0;
let misses = 0;
const MAX_MISSES = 5;
let timerInterval = null;
let speechTimeout = null;
let chickenX = 50, chickenY = 50;
let targetX = 50, targetY = 50;
let chickenSpeed = 3;
let gameRunning = false;
let highScore = parseInt(localStorage.getItem('kokoska_hi') || '0');
let animFrame = null;
let isCaught = false;

// Generate grass
const grass = document.getElementById('grass');
for (let i = 0; i < 40; i++) {
  const blade = document.createElement('div');
  blade.className = 'grass-blade';
  blade.style.height = (15 + Math.random() * 15) + 'px';
  blade.style.opacity = 0.6 + Math.random() * 0.4;
  grass.appendChild(blade);
}

// Update hi score displays
function updateHiDisplay() {
  document.getElementById('start-hi').textContent = `Best: ${highScore} chicken${highScore !== 1 ? 's' : ''}`;
  document.getElementById('go-hi').textContent = `Best: ${highScore}`;
}
updateHiDisplay();

// Screen management
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// Speech bubble
function showSpeech(text, x, y) {
  speechEl.textContent = text;
  speechEl.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  speechEl.style.top = Math.max(y - 60, 10) + 'px';
  speechEl.classList.add('visible');
  clearTimeout(speechTimeout);
  speechTimeout = setTimeout(() => speechEl.classList.remove('visible'), 800);
}

// Score popup
function showScorePop(x, y) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = '+1 🥚';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  arenaEl.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// Miss text
function showMiss(x, y) {
  const el = document.createElement('div');
  el.className = 'miss-text';
  el.textContent = SOUNDS.miss[Math.floor(Math.random() * SOUNDS.miss.length)];
  el.style.left = Math.min(x, window.innerWidth - 120) + 'px';
  el.style.top = y + 'px';
  arenaEl.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// Feathers
function spawnFeathers(x, y) {
  for (let i = 0; i < 6; i++) {
    const f = document.createElement('div');
    f.className = 'feather';
    f.textContent = ['🪶', '✨', '💨'][i % 3];
    const angle = (i / 6) * Math.PI * 2;
    const dist = 40 + Math.random() * 60;
    f.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    f.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    f.style.setProperty('--dr', (Math.random() * 360) + 'deg');
    f.style.left = x + 'px';
    f.style.top = y + 'px';
    arenaEl.appendChild(f);
    setTimeout(() => f.remove(), 800);
  }
}

// Chicken movement AI
function getArenaSize() {
  const rect = arenaEl.getBoundingClientRect();
  return { w: rect.width, h: rect.height - 60 };
}

function pickNewTarget(avoidX, avoidY) {
  const { w, h } = getArenaSize();
  const chicSize = chickenEl.offsetWidth || 60;
  let tx, ty, tries = 0;
  do {
    tx = chicSize/2 + Math.random() * (w - chicSize);
    ty = chicSize/2 + Math.random() * (h - chicSize - 20);
    tries++;
  } while (tries < 10 && Math.abs(tx - avoidX) < 80 && Math.abs(ty - avoidY) < 80);
  return { tx, ty };
}

function moveChicken() {
  if (!gameRunning) return;
  const { w, h } = getArenaSize();
  const chicSize = chickenEl.offsetWidth || 60;
  
  const dx = targetX - chickenX;
  const dy = targetY - chickenY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 10 || (chickenSpeed > 8 && Math.random() < 0.03)) {
    // Reached target, pick new one
    const { tx, ty } = pickNewTarget(chickenX, chickenY);
    targetX = tx; targetY = ty;
    // Random cluck
    if (Math.random() < 0.4) {
      const txt = SOUNDS.cluck[Math.floor(Math.random() * SOUNDS.cluck.length)];
      showSpeech(txt, chickenX, chickenY);
      playCluck();
    }
  } else {
    const step = chickenSpeed * (0.8 + Math.random() * 0.5);
    const nx = chickenX + (dx / dist) * step;
    const ny = chickenY + (dy / dist) * step;
    
    // Clamp to arena
    chickenX = Math.max(chicSize/2, Math.min(w - chicSize/2, nx));
    chickenY = Math.max(chicSize/2, Math.min(h - chicSize/2, ny));
    
    // Face direction
    if (dx < -5) { chickenEl.style.transform = 'scaleX(1)'; }
    else if (dx > 5) { chickenEl.style.transform = 'scaleX(-1)'; }
  }

  chickenEl.style.left = (chickenX - chicSize/2) + 'px';
  chickenEl.style.top = (chickenY - chicSize/2) + 'px';

  animFrame = requestAnimationFrame(moveChicken);
}

// Update lives display
function updateLives() {
  const hearts = '❤️'.repeat(MAX_MISSES - misses) + '🖤'.repeat(misses);
  const livesEl = document.getElementById('lives-display');
  livesEl.textContent = hearts;
  if (misses >= 3) livesEl.classList.add('danger');
  else livesEl.classList.remove('danger');
}

// Show life lost popup
function showLifeLost(x, y) {
  const el = document.createElement('div');
  el.className = 'life-lost';
  el.textContent = '💔';
  el.style.left = Math.min(x, window.innerWidth - 40) + 'px';
  el.style.top = y + 'px';
  arenaEl.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// Chicken tap/click
chickenEl.addEventListener('pointerdown', (e) => {
  if (!gameRunning || isCaught) return;
  e.stopPropagation();
  isCaught = true;

  const txt = SOUNDS.caught[Math.floor(Math.random() * SOUNDS.caught.length)];
  showSpeech(txt, chickenX, chickenY);
  spawnFeathers(chickenX, chickenY);
  showScorePop(chickenX - 20, chickenY - 30);

  score++;
  scoreEl.textContent = '🐔 ' + score;

  chickenEl.classList.add('caught');

  // Chicken jolts then keeps running — pick new target immediately
  const { tx, ty } = pickNewTarget(chickenX, chickenY);
  targetX = tx; targetY = ty;
  chickenSpeed = Math.min(3 + score * 0.5, 16);

  setTimeout(() => {
    chickenEl.classList.remove('caught');
    isCaught = false;
  }, 350);
});

// Miss tap — only count if NOT clicking on the chicken
arenaEl.addEventListener('pointerdown', (e) => {
  if (!gameRunning) return;
  if (chickenEl.contains(e.target) || e.target === chickenEl) return;
  const arenaTop = arenaEl.getBoundingClientRect().top;
  misses++;
  updateLives();
  showMiss(e.clientX, e.clientY - arenaTop);
  showLifeLost(e.clientX + 20, e.clientY - arenaTop - 20);
  playMiss();
  if (Math.random() < 0.5) {
    const txt = SOUNDS.miss[Math.floor(Math.random() * SOUNDS.miss.length)];
    showSpeech(txt, chickenX, chickenY);
  }
  if (misses >= MAX_MISSES) endGame();
});

// Countdown then start
function startCountdown(cb) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-num');
  overlay.style.display = 'flex';
  let count = 3;
  
  function tick() {
    if (count === 0) {
      numEl.textContent = 'GO! 🐔';
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'countPop 0.8s cubic-bezier(0.68,-0.55,0.265,1.55) forwards';
      playGoSound();
      setTimeout(() => {
        overlay.style.display = 'none';
        cb();
      }, 700);
      return;
    }
    numEl.textContent = count;
    numEl.style.animation = 'none';
    void numEl.offsetWidth;
    numEl.style.animation = 'countPop 1s cubic-bezier(0.68,-0.55,0.265,1.55) forwards';
    playCountdownBeep(count);
    count--;
    setTimeout(tick, 900);
  }
  tick();
}

function startGame() {
  score = 0;
  misses = 0;
  chickenSpeed = 3;
  isCaught = false;
  gameRunning = false;

  scoreEl.textContent = '🐔 0';
  updateLives();
  speechEl.classList.remove('visible');

  const { w, h } = getArenaSize();
  chickenX = w / 2;
  chickenY = h / 2;
  const { tx, ty } = pickNewTarget(chickenX, chickenY);
  targetX = tx; targetY = ty;

  showScreen('game-screen');

  startCountdown(() => {
    gameRunning = true;
    musicPlay();
    animFrame = requestAnimationFrame(moveChicken);
  });
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  playGameOver();

  const isRecord = score > highScore;
  if (isRecord) {
    highScore = score;
    localStorage.setItem('kokoska_hi', highScore);
    updateHiDisplay();
  }

  document.getElementById('final-score').textContent = score;
  const recEl = document.getElementById('new-record');
  recEl.classList.toggle('hidden', !(isRecord && score > 0));

  document.querySelector('.gameover-title').textContent = misses >= MAX_MISSES ? 'Too many misses! 😤' : 'Game Over!';

  const goEmoji = document.getElementById('go-emoji');
  goEmoji.textContent = score === 0 ? '😅' : score < 5 ? '😤' : score < 10 ? '😄' : '🏆';

  setTimeout(() => {
    showScreen('gameover-screen');
    if (score > 0) promptName(score);
  }, 300);
}

// ── SUPABASE LEADERBOARD ──────────────────────────────────────
const SUPABASE_URL = 'https://prhqbxlnvblmjkerrjvx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PEfSEFlKKVQ38oy5zvEaAQ_dRlhbvEM';
const MEDALS = ['🥇','🥈','🥉'];

// Generate or load a persistent player_id
function getPlayerId() {
  let id = localStorage.getItem('kokoska_player_id');
  if (!id) {
    id = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('kokoska_player_id', id);
  }
  return id;
}

// Get saved player name
function getSavedName() {
  return localStorage.getItem('kokoska_player_name') || '';
}

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers,
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function submitScore(name, score) {
  const player_id = getPlayerId();
  localStorage.setItem('kokoska_player_name', name);

  // Check if player already exists
  const existing = await sbFetch(`leaderboard?player_id=eq.${player_id}&select=id,score`);

  if (existing && existing.length > 0) {
    // Update only if new score is higher
    if (score > existing[0].score) {
      await sbFetch(`leaderboard?player_id=eq.${player_id}`, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ name, score, updated_at: new Date().toISOString() })
      });
    }
  } else {
    // Insert new player
    await sbFetch('leaderboard', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify({ name, score, player_id, updated_at: new Date().toISOString() })
    });
  }
}

async function fetchLeaderboard() {
  return await sbFetch('leaderboard?select=name,score&order=score.desc&limit=10');
}

async function renderLeaderboard() {
  const el = document.getElementById('lb-list');
  el.innerHTML = '<div class="lb-empty">Loading... 🐔</div>';
  try {
    const lb = await fetchLeaderboard();
    if (!lb || !lb.length) {
      el.innerHTML = '<div class="lb-empty">No scores yet — go catch some chickens! 🐔</div>';
      return;
    }
    el.innerHTML = lb.map((entry, i) => `
      <div class="lb-row" style="animation-delay:${i*0.06}s">
        <span class="lb-rank">${MEDALS[i] || (i+1)+'.'}</span>
        <span class="lb-name">${entry.name}</span>
        <span class="lb-score">🐔 ${entry.score}</span>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<div class="lb-empty">Could not load scores 😕</div>';
  }
}

// Name input flow
let pendingScore = 0;
function promptName(score) {
  pendingScore = score;
  const savedName = getSavedName();
  const input = document.getElementById('name-input');
  // If we already know the name, prefill it
  input.value = savedName;
  document.getElementById('name-overlay').classList.remove('hidden');
  setTimeout(() => { input.focus(); input.select(); }, 100);
}

document.getElementById('name-submit-btn').addEventListener('click', async () => {
  const name = document.getElementById('name-input').value.trim() || 'Anonymous';
  document.getElementById('name-overlay').classList.add('hidden');
  document.getElementById('name-submit-btn').textContent = 'Saving...';
  try {
    await submitScore(name, pendingScore);
  } catch(e) {
    console.warn('Score save failed:', e);
  }
  document.getElementById('name-submit-btn').textContent = 'Save 🐔';
});

document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('name-submit-btn').click();
});

// Nav buttons
document.getElementById('go-lb-btn').addEventListener('click', () => {
  renderLeaderboard();
  showScreen('leaderboard-screen');
});
document.getElementById('lb-back-btn').addEventListener('click', () => showScreen('gameover-screen'));

// Add leaderboard button to start screen
const startLbBtn = document.createElement('button');
startLbBtn.className = 'leaderboard-btn';
startLbBtn.textContent = '🏆 Leaderboard';
startLbBtn.addEventListener('click', () => { renderLeaderboard(); showScreen('leaderboard-screen'); });
document.getElementById('start-screen').appendChild(startLbBtn);
// ──────────────────────────────────────────────────────────────

// ── THEMES ────────────────────────────────────────────────────
const THEMES = {
  farm:  { chicken: '🐔', emoji: '🐄', groundLabel: 'grass' },
  space: { chicken: '🐔', emoji: '🚀', groundLabel: 'moon'  },
  beach: { chicken: '🐔', emoji: '🏖️', groundLabel: 'sand'  },
};
let currentTheme = localStorage.getItem('kokoska_theme') || 'farm';

function applyTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('kokoska_theme', theme);
  document.body.className = 'theme-' + theme;
  document.getElementById('arena').className = 'theme-' + theme;

  // Update active button
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });

  // Update chicken emoji per theme
  const chick = THEMES[theme].chicken;
  document.getElementById('chicken').textContent = chick;
  document.getElementById('preview-chicken').textContent = chick;

  // Rebuild arena decorations
  rebuildArenaDecorations(theme);
}

function rebuildArenaDecorations(theme) {
  // Remove old decorations
  document.querySelectorAll('.space-star, .beach-wave, .farm-cloud').forEach(e => e.remove());

  if (theme === 'space') {
    // Add stars
    for (let i = 0; i < 30; i++) {
      const star = document.createElement('div');
      star.className = 'space-star';
      const size = 1 + Math.random() * 3;
      star.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%; top:${Math.random()*85}%;
        animation-delay:${Math.random()*2}s;
        animation-duration:${1.5+Math.random()*2}s;
      `;
      document.getElementById('arena').appendChild(star);
    }
  } else if (theme === 'beach') {
    // Add waves
    for (let i = 0; i < 3; i++) {
      const wave = document.createElement('div');
      wave.className = 'beach-wave';
      wave.style.cssText = `
        bottom:${45 + i*8}px;
        opacity:${0.3 + i*0.15};
        animation-delay:${i*0.4}s;
      `;
      document.getElementById('arena').appendChild(wave);
    }
  }
}

// Theme button clicks
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
});

// Apply saved theme on load
applyTheme(currentTheme);
// ──────────────────────────────────────────────────────────────

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', startGame);

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/CatchThatChicken/sw.js', { scope: '/CatchThatChicken/' }).catch(() => {});
}

// Preview chicken dance
document.getElementById('preview-chicken').addEventListener('click', () => {
  const el = document.getElementById('preview-chicken');
  const txt = SOUNDS.cluck[Math.floor(Math.random() * SOUNDS.cluck.length)];
  el.textContent = '🐔 ' + txt;
  setTimeout(() => el.textContent = '🐔', 600);
});
</script>
